name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.10.2-bin.zip
          unzip -q gradle-8.10.2-bin.zip

      - name: Build debug APK
        run: ./gradle-8.10.2/bin/gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Show build outputs
        run: |
          echo "=== APK folders ==="
          find . -type d \( -path "*/build/outputs/*" -o -path "*/outputs/*" \) | sort || true
          echo "=== APK files ==="
          find . -type f \( -name "*.apk" -o -name "*.aab" \) | sort || true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rodds-tkd-admin-debug
          path: |
            **/*.apk
          if-no-files-found: error
